name: Staging Push Activation

on:
  workflow_dispatch:
    inputs:
      expected_git_sha:
        description: Exact main commit SHA to activate for staging.
        required: true
        type: string

permissions:
  contents: read

jobs:
  activate:
    name: Deploy staging FCM dispatcher
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
      STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
      STAGING_SUPABASE_PROJECT_REF: ${{ vars.STAGING_SUPABASE_PROJECT_REF }}
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
      PUSH_DISPATCH_SECRET: ${{ secrets.PUSH_DISPATCH_SECRET }}
      EXPECTED_GIT_SHA: ${{ inputs.expected_git_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify exact staging activation contract
        shell: bash
        run: |
          set -euo pipefail
          [[ "$EXPECTED_GIT_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "expected_git_sha must be a full SHA"
            exit 1
          }
          [[ "$GITHUB_SHA" = "$EXPECTED_GIT_SHA" ]] || {
            echo "The checked-out commit does not match expected_git_sha"
            exit 1
          }
          for value in \
            SUPABASE_ACCESS_TOKEN \
            STAGING_SUPABASE_URL STAGING_SUPABASE_ANON_KEY \
            STAGING_SUPABASE_PROJECT_REF FIREBASE_PROJECT_ID \
            FCM_SERVICE_ACCOUNT_JSON PUSH_DISPATCH_SECRET; do
            [[ -n "${!value}" ]] || {
              echo "Missing required staging configuration: $value"
              exit 1
            }
          done
          [[ "$STAGING_SUPABASE_PROJECT_REF" =~ ^[a-z0-9]{20}$ ]] || {
            echo "Invalid staging project ref"
            exit 1
          }
          [[ "$STAGING_SUPABASE_URL" = "https://$STAGING_SUPABASE_PROJECT_REF.supabase.co" ]] || {
            echo "Staging URL/project ref mismatch"
            exit 1
          }
          [[ "$PUSH_DISPATCH_SECRET" =~ ^[A-Za-z0-9_-]{48,}$ ]] || {
            echo "PUSH_DISPATCH_SECRET format is invalid"
            exit 1
          }
          printf '%s' "$FCM_SERVICE_ACCOUNT_JSON" | jq -e \
            --arg expected_project "$FIREBASE_PROJECT_ID" \
            '.project_id == $expected_project and
             (.client_email | type == "string" and length > 3) and
             (.private_key | type == "string" and contains("BEGIN PRIVATE KEY"))' \
            >/dev/null
          echo "Staging activation contract verified."

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set staging Edge secrets without logging credentials
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          secret_file="$RUNNER_TEMP/odak-kampi-staging-push.env"
          printf 'FCM_SERVICE_ACCOUNT_JSON=%s\n' "$FCM_SERVICE_ACCOUNT_JSON" > "$secret_file"
          printf 'PUSH_DISPATCH_SECRET=%s\n' "$PUSH_DISPATCH_SECRET" >> "$secret_file"
          trap 'rm -f "$secret_file"' EXIT
          supabase secrets set \
            --project-ref "$STAGING_SUPABASE_PROJECT_REF" \
            --env-file "$secret_file"

      - name: Deploy staging dispatcher
        shell: bash
        run: |
          set -euo pipefail
          supabase functions deploy dispatch-push \
            --project-ref "$STAGING_SUPABASE_PROJECT_REF" \
            --use-api \
            --no-verify-jwt

      - name: Configure private dispatcher runtime
        shell: bash
        run: |
          set -euo pipefail
          response="$(curl --fail-with-body --silent --show-error \
            -X POST "$STAGING_SUPABASE_URL/functions/v1/dispatch-push" \
            -H "Authorization: Bearer $STAGING_SUPABASE_ANON_KEY" \
            -H 'Content-Type: application/json' \
            -H "x-push-dispatch-secret: $PUSH_DISPATCH_SECRET" \
            --data '{"action":"configure_dispatch"}')"
          printf '%s' "$response" | jq -e '.configured == true' >/dev/null

      - name: Verify dispatcher health without enqueueing a notification
        shell: bash
        run: |
          set -euo pipefail
          response="$(curl --fail-with-body --silent --show-error \
            -X POST "$STAGING_SUPABASE_URL/functions/v1/dispatch-push" \
            -H "Authorization: Bearer $STAGING_SUPABASE_ANON_KEY" \
            -H 'Content-Type: application/json' \
            -H "x-push-dispatch-secret: $PUSH_DISPATCH_SECRET" \
            --data '{"source":"staging_activation"}')"
          printf '%s' "$response" | jq -e \
            '(.claimed | type == "number") and
             (.sent | type == "number") and
             (.retried | type == "number") and
             (.failed | type == "number")' \
            >/dev/null
          echo "Staging dispatcher health verified."
