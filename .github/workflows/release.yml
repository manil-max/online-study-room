name: Release APK

# `v2`, `v3` gibi bir etiket push'landığında çalışır:
#   git tag v2 && git push origin v2
# Etiketteki sayı (2) hem APK'nın versionCode'u olur hem de uygulamanın
# güncelleme kontrolünde kullandığı sürüm numarasıdır — ikisi asla şaşmaz.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # Release oluşturup APK yükleyebilmek için.

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Etiketten sürüm kodunu çıkar (v2 -> 2)
        id: ver
        run: echo "code=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Keystore'u secret'tan çöz
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/key.jks

      - name: key.properties oluştur
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=key.jks
          EOF

      - run: flutter pub get

      - name: Release APK derle
        run: |
          flutter build apk --release \
            --build-number=${{ steps.ver.outputs.code }} \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: GitHub Release'e APK yükle
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: app/build/app/outputs/flutter-apk/app-release.apk
