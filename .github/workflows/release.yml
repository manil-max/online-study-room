name: Release APK

# Stable: git tag vN && git push origin vN
# Beta:   git tag beta-vN && git push origin beta-vN
# Tag sonundaki N hem APK versionCode hem de updater build numarasidir.
on:
  push:
    tags:
      - 'v*'
      - 'beta-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: ${{ startsWith(github.ref_name, 'beta-') && 'staging' || 'production' }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Kanonik migration head
        id: contract
        shell: pwsh
        run: |
          $contract = Get-Content ../tooling/release/deploy-contract.json -Raw | ConvertFrom-Json
          $environment = if ($env:GITHUB_REF_NAME.StartsWith('beta-')) { 'staging' } else { 'production' }
          "head=$($contract.$environment.migration_head)" >> $env:GITHUB_OUTPUT

      - name: Kanal ve surum bilgisini cikar
        id: meta
        run: |
          TAG="$GITHUB_REF_NAME"
          CODE="${TAG##*v}"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == beta* ]]; then
            echo "flavor=beta" >> "$GITHUB_OUTPUT"
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "src=app-beta-release.apk" >> "$GITHUB_OUTPUT"
            echo "asset=app-beta-release.apk" >> "$GITHUB_OUTPUT"
          else
            echo "flavor=stable" >> "$GITHUB_OUTPUT"
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "src=app-stable-release.apk" >> "$GITHUB_OUTPUT"
            echo "asset=app-release.apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Protected release gate
        shell: pwsh
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          PRODUCTION_SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
          STAGING_SUPABASE_PROJECT_REF: ${{ vars.STAGING_SUPABASE_PROJECT_REF }}
          PRODUCTION_SUPABASE_PROJECT_REF: ${{ vars.PRODUCTION_SUPABASE_PROJECT_REF }}
        run: |
          $channel = '${{ steps.meta.outputs.channel }}'
          $projectRef = if ($channel -eq 'beta') { $env:STAGING_SUPABASE_PROJECT_REF } else { $env:PRODUCTION_SUPABASE_PROJECT_REF }
          $url = if ($channel -eq 'beta') { $env:STAGING_SUPABASE_URL } else { $env:PRODUCTION_SUPABASE_URL }
          ../tooling/release/release-gate.ps1 -Channel $channel -ProjectRef $projectRef -SupabaseUrl $url -StagingProjectRef $env:STAGING_SUPABASE_PROJECT_REF -ProductionProjectRef $env:PRODUCTION_SUPABASE_PROJECT_REF -ExpectedGitSha $env:GITHUB_SHA -ExpectedMigrationHead '${{ steps.contract.outputs.head }}'

      - name: Release gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-gate-${{ github.run_id }}
          path: .artifacts/deploy-evidence/**
          if-no-files-found: error

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Keystore'u secrettan coz
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/key.jks

      - name: key.properties olustur
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=key.jks
          EOF

      - run: flutter pub get

      - name: Kanal/backend manifestini env.json olarak üret
        shell: bash
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          PRODUCTION_SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
          PRODUCTION_SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_SUPABASE_ANON_KEY }}
          STAGING_SUPABASE_PROJECT_REF: ${{ vars.STAGING_SUPABASE_PROJECT_REF }}
          PRODUCTION_SUPABASE_PROJECT_REF: ${{ vars.PRODUCTION_SUPABASE_PROJECT_REF }}
        run: |
          if [ "${{ steps.meta.outputs.channel }}" = "beta" ]; then
            export APP_ENVIRONMENT=staging
            export SUPABASE_URL="$STAGING_SUPABASE_URL"
            export SUPABASE_ANON_KEY="$STAGING_SUPABASE_ANON_KEY"
            export SUPABASE_PROJECT_REF="$STAGING_SUPABASE_PROJECT_REF"
            export DISTRIBUTION_CHANNEL=githubBeta
          else
            export APP_ENVIRONMENT=production
            export SUPABASE_URL="$PRODUCTION_SUPABASE_URL"
            export SUPABASE_ANON_KEY="$PRODUCTION_SUPABASE_ANON_KEY"
            export SUPABASE_PROJECT_REF="$PRODUCTION_SUPABASE_PROJECT_REF"
            export DISTRIBUTION_CHANNEL=githubStable
          fi
          export RELEASE_CHANNEL="${{ steps.meta.outputs.channel }}"
          python - <<'PY'
          import json, os
          manifest = {
              "CHANNEL": os.environ["RELEASE_CHANNEL"],
              "APP_ENVIRONMENT": os.environ["APP_ENVIRONMENT"],
              "ALLOW_IN_MEMORY": "false",
              "SUPABASE_URL": os.environ["SUPABASE_URL"],
              "SUPABASE_ANON_KEY": os.environ["SUPABASE_ANON_KEY"],
              "SUPABASE_PROJECT_REF": os.environ["SUPABASE_PROJECT_REF"],
              "STAGING_SUPABASE_PROJECT_REF": os.environ["STAGING_SUPABASE_PROJECT_REF"],
              "PRODUCTION_SUPABASE_PROJECT_REF": os.environ["PRODUCTION_SUPABASE_PROJECT_REF"],
              "GIT_COMMIT_SHA": os.environ["GITHUB_SHA"],
              "MIGRATION_HEAD": "${{ steps.contract.outputs.head }}",
              "DISTRIBUTION_CHANNEL": os.environ["DISTRIBUTION_CHANNEL"],
          }
          with open("env.json", "w", encoding="utf-8") as handle:
              json.dump(manifest, handle)
          PY

      - name: Kanal/backend fail-closed guard
        run: >
          flutter test test/core/current_build_manifest_gate_test.dart
          --dart-define-from-file=env.json
          --dart-define=ENFORCE_CURRENT_BUILD_MANIFEST=true

      - name: Release APK derle (${{ steps.meta.outputs.flavor }})
        run: |
          # WP-110: GitHub sideload only (stable/beta). Play AAB ayrı komut:
          # flutter build appbundle --flavor play --release \
          #   --dart-define=DISTRIBUTION_CHANNEL=play --dart-define-from-file=env.json
          flutter build apk --release \
            --flavor ${{ steps.meta.outputs.flavor }} \
            --build-number=${{ steps.meta.outputs.code }} \
            --dart-define-from-file=env.json

      - name: Play installer izni guard (sideload APK'de olmali)
        run: |
          # stable/beta APK REQUEST_INSTALL_PACKAGES içermeli (sideload).
          APK="build/app/outputs/flutter-apk/${{ steps.meta.outputs.src }}"
          if ! command -v aapt2 >/dev/null 2>&1; then
            echo "aapt2 yok; permission guard atlandi"
            exit 0
          fi
          PERMS=$(aapt2 dump permissions "$APK" 2>/dev/null || true)
          echo "$PERMS"
          echo "$PERMS" | grep -q "android.permission.REQUEST_INSTALL_PACKAGES" \
            || { echo "sideload APK installer izni eksik"; exit 1; }

      - name: APK dosyasini adlandir ve SHA-256 uret
        working-directory: app/build/app/outputs/flutter-apk
        run: |
          if [ "${{ steps.meta.outputs.src }}" != "${{ steps.meta.outputs.asset }}" ]; then
            mv "${{ steps.meta.outputs.src }}" "${{ steps.meta.outputs.asset }}"
          fi
          sha256sum "${{ steps.meta.outputs.asset }}" > "${{ steps.meta.outputs.asset }}.sha256"

      - name: CHANGELOG bolumunu release body olarak hazirla
        working-directory: ${{ github.workspace }}
        run: |
          python - <<'PY'
          from pathlib import Path

          tag = "${{ github.ref_name }}".lower()
          changelog = Path("CHANGELOG.md")
          output = Path("release_body.md")
          if not changelog.exists():
              output.write_text(f"# {tag}\n\nRelease notu CHANGELOG.md icinde bulunamadi.\n", encoding="utf-8")
              raise SystemExit(0)

          lines = changelog.read_text(encoding="utf-8").splitlines()
          starts = [i for i, line in enumerate(lines) if line.startswith("## ")]
          selected = None
          for index, start in enumerate(starts):
              heading = lines[start].lower()
              if tag in heading:
                  end = starts[index + 1] if index + 1 < len(starts) else len(lines)
                  selected = "\n".join(lines[start:end]).strip()
                  break

          if selected is None:
              selected = f"# {tag}\n\nBu tag icin CHANGELOG.md bolumu bulunamadi; release body'yi elle kontrol et."

          output.write_text(selected + "\n", encoding="utf-8")
          PY

      - name: GitHub Release'e APK ve checksum yukle
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.meta.outputs.prerelease }}
          body_path: release_body.md
          files: |
            app/build/app/outputs/flutter-apk/${{ steps.meta.outputs.asset }}
            app/build/app/outputs/flutter-apk/${{ steps.meta.outputs.asset }}.sha256
