name: Release APK

# İki kanal (WP-13):
#   Stable:  git tag vN     && git push origin vN       -> "Odak Kampı"      (herkese)
#   Beta:    git tag beta-vN && git push origin beta-vN  -> "Odak Kampı Beta" (prerelease)
# Etiketteki 'v' sonrası sayı hem APK versionCode'u hem de uygulamanın güncelleme
# kontrolünde kullandığı sürüm numarasıdır — ikisi asla şaşmaz.
on:
  push:
    tags:
      - 'v*'
      - 'beta-v*'

permissions:
  contents: write   # Release oluşturup APK yükleyebilmek için.

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Kanal ve sürüm bilgisini çıkar
        id: meta
        run: |
          TAG="$GITHUB_REF_NAME"
          # 'v' harfinden sonraki sayı: v4 -> 4, beta-v1 -> 1
          CODE="${TAG##*v}"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == beta* ]]; then
            echo "flavor=beta" >> "$GITHUB_OUTPUT"
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "src=app-beta-release.apk" >> "$GITHUB_OUTPUT"
            echo "asset=app-beta-release.apk" >> "$GITHUB_OUTPUT"
          else
            echo "flavor=stable" >> "$GITHUB_OUTPUT"
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            # Stable asset adı sabit tutulur: eski kullanıcıların updater'ı bu adı arar.
            echo "src=app-stable-release.apk" >> "$GITHUB_OUTPUT"
            echo "asset=app-release.apk" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Keystore'u secret'tan çöz
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/key.jks

      - name: key.properties oluştur
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=key.jks
          EOF

      - run: flutter pub get

      - name: Release APK derle (${{ steps.meta.outputs.flavor }})
        run: |
          flutter build apk --release \
            --flavor ${{ steps.meta.outputs.flavor }} \
            --build-number=${{ steps.meta.outputs.code }} \
            --dart-define=CHANNEL=${{ steps.meta.outputs.channel }} \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: APK'yı adlandır + SHA-256 üret (in-app bütünlük doğrulaması)
        working-directory: app/build/app/outputs/flutter-apk
        run: |
          mv "${{ steps.meta.outputs.src }}" "${{ steps.meta.outputs.asset }}"
          sha256sum "${{ steps.meta.outputs.asset }}" > "${{ steps.meta.outputs.asset }}.sha256"

      - name: GitHub Release'e APK + checksum yükle
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            app/build/app/outputs/flutter-apk/${{ steps.meta.outputs.asset }}
            app/build/app/outputs/flutter-apk/${{ steps.meta.outputs.asset }}.sha256
