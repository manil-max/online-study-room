name: Windows Release

# Stable: git tag vN && git push origin vN
# Beta:   git tag beta-vN && git push origin beta-vN
# Manual: workflow_dispatch
#
# N = build number (Android release.yml ile hizalı).
# Artefakt: odak-kampi-windows-{stable|beta}.msix + .zip + .sha256
# İmza: secret yoksa self-signed (QA). PFX repoya/log'a GİRMEZ.
# Store MSIX ayrı kanal (publisher identity kalıcı) — docs/WINDOWS-RELEASE-GATE.md

on:
  push:
    tags:
      - 'v*'
      - 'beta-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    environment:
      name: ${{ startsWith(github.ref_name, 'beta-') && 'staging' || 'production' }}
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Kanonik migration head
        id: contract
        shell: pwsh
        run: |
          $contract = Get-Content ../tooling/release/deploy-contract.json -Raw | ConvertFrom-Json
          $environment = if ($env:GITHUB_REF_NAME.StartsWith('beta-')) { 'staging' } else { 'production' }
          "head=$($contract.$environment.migration_head)" >> $env:GITHUB_OUTPUT

      - name: Kanal ve surum
        id: meta
        shell: bash
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          if [[ "$GITHUB_REF" != refs/tags/* ]]; then
            CODE=$(grep -E '^version:' pubspec.yaml | head -1 | sed -E 's/.*\+([0-9]+).*/\1/')
            TAG="manual-v${CODE}"
            CHANNEL=stable
            PRERELEASE=false
          else
            CODE="${TAG##*v}"
            if [[ "$TAG" == beta* ]]; then
              CHANNEL=beta
              PRERELEASE=true
            else
              CHANNEL=stable
              PRERELEASE=false
            fi
          fi
          MSIX_VER="1.0.0.${CODE}"
          ASSET_MSIX="odak-kampi-windows-${CHANNEL}.msix"
          ASSET_ZIP="odak-kampi-windows-${CHANNEL}.zip"
          {
            echo "tag=$TAG"
            echo "code=$CODE"
            echo "channel=$CHANNEL"
            echo "prerelease=$PRERELEASE"
            echo "msix_ver=$MSIX_VER"
            echo "asset_msix=$ASSET_MSIX"
            echo "asset_zip=$ASSET_ZIP"
          } >> "$GITHUB_OUTPUT"
          echo "Windows release meta: tag=$TAG code=$CODE channel=$CHANNEL msix=$MSIX_VER"

      - name: Protected release gate
        shell: pwsh
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          PRODUCTION_SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
          STAGING_SUPABASE_PROJECT_REF: ${{ vars.STAGING_SUPABASE_PROJECT_REF }}
          PRODUCTION_SUPABASE_PROJECT_REF: ${{ vars.PRODUCTION_SUPABASE_PROJECT_REF }}
        run: |
          $channel = '${{ steps.meta.outputs.channel }}'
          $projectRef = if ($channel -eq 'beta') { $env:STAGING_SUPABASE_PROJECT_REF } else { $env:PRODUCTION_SUPABASE_PROJECT_REF }
          $url = if ($channel -eq 'beta') { $env:STAGING_SUPABASE_URL } else { $env:PRODUCTION_SUPABASE_URL }
          ../tooling/release/release-gate.ps1 -Channel $channel -ProjectRef $projectRef -SupabaseUrl $url -StagingProjectRef $env:STAGING_SUPABASE_PROJECT_REF -ProductionProjectRef $env:PRODUCTION_SUPABASE_PROJECT_REF -ExpectedGitSha $env:GITHUB_SHA -ExpectedMigrationHead '${{ steps.contract.outputs.head }}'

      - name: Release gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-gate-${{ github.run_id }}
          path: .artifacts/deploy-evidence/**
          if-no-files-found: error

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Windows desktop
        run: |
          flutter config --enable-windows-desktop
          flutter --version

      - name: Kanal/backend manifestini env.json olarak üret
        shell: pwsh
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          PRODUCTION_SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
          PRODUCTION_SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_SUPABASE_ANON_KEY }}
          STAGING_SUPABASE_PROJECT_REF: ${{ vars.STAGING_SUPABASE_PROJECT_REF }}
          PRODUCTION_SUPABASE_PROJECT_REF: ${{ vars.PRODUCTION_SUPABASE_PROJECT_REF }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          $channel = "${{ steps.meta.outputs.channel }}"
          if ($channel -eq "beta") {
            $backendEnvironment = "staging"
            $selectedUrl = $env:STAGING_SUPABASE_URL
            $selectedKey = $env:STAGING_SUPABASE_ANON_KEY
            $selectedRef = $env:STAGING_SUPABASE_PROJECT_REF
          } else {
            $backendEnvironment = "production"
            $selectedUrl = $env:PRODUCTION_SUPABASE_URL
            $selectedKey = $env:PRODUCTION_SUPABASE_ANON_KEY
            $selectedRef = $env:PRODUCTION_SUPABASE_PROJECT_REF
          }
          $manifest = @{
            CHANNEL = $channel
            APP_ENVIRONMENT = $backendEnvironment
            ALLOW_IN_MEMORY = "false"
            SUPABASE_URL = $selectedUrl
            SUPABASE_ANON_KEY = $selectedKey
            SUPABASE_PROJECT_REF = $selectedRef
            STAGING_SUPABASE_PROJECT_REF = $env:STAGING_SUPABASE_PROJECT_REF
            PRODUCTION_SUPABASE_PROJECT_REF = $env:PRODUCTION_SUPABASE_PROJECT_REF
            GIT_COMMIT_SHA = $env:GITHUB_SHA
            MIGRATION_HEAD = "${{ steps.contract.outputs.head }}"
            DISTRIBUTION_CHANNEL = "windows"
            SENTRY_DSN = $env:SENTRY_DSN
            SENTRY_ENABLED = "false"
          }
          $manifest | ConvertTo-Json | Set-Content -LiteralPath env.json -Encoding utf8

      - run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --dart-define-from-file=env.json --concurrency=1

      - name: Kanal/backend fail-closed guard
        run: >
          flutter test test/core/current_build_manifest_gate_test.dart
          --dart-define-from-file=env.json
          --dart-define=ENFORCE_CURRENT_BUILD_MANIFEST=true

      - name: Build Windows release
        run: >
          flutter build windows --release
          --build-number=${{ steps.meta.outputs.code }}
          --dart-define-from-file=env.json

      - name: MSIX version in pubspec (CI)
        shell: bash
        run: |
          # msix_config.msix_version = 1.0.0.N
          python - <<'PY'
          from pathlib import Path
          import re, os
          p = Path("pubspec.yaml")
          text = p.read_text(encoding="utf-8")
          ver = os.environ["MSIX_VER"]
          text2, n = re.subn(
              r"(msix_version:\s*)[\d.]+",
              r"\g<1>" + ver,
              text,
              count=1,
          )
          if n != 1:
              raise SystemExit(f"msix_version replace failed n={n}")
          p.write_text(text2, encoding="utf-8")
          print("msix_version ->", ver)
          PY
        env:
          MSIX_VER: ${{ steps.meta.outputs.msix_ver }}

      - name: Create MSIX (self-signed; install_certificate false)
        run: dart run msix:create --build-windows false

      - name: Collect artefacts + SHA-256
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $out = "build/windows-dist"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $release = "build/windows/x64/runner/Release"
          if (-not (Test-Path $release)) { throw "Release dir missing: $release" }

          $msixName = "${{ steps.meta.outputs.asset_msix }}"
          $zipName = "${{ steps.meta.outputs.asset_zip }}"

          $found = Get-ChildItem -Path $release -Filter *.msix -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($found) {
            Copy-Item $found.FullName (Join-Path $out $msixName) -Force
            $hash = (Get-FileHash -Algorithm SHA256 (Join-Path $out $msixName)).Hash.ToLower()
            Set-Content -Path (Join-Path $out "$msixName.sha256") -Value "$hash  $msixName" -NoNewline
            Write-Host "MSIX sha256=$hash"
          } else {
            Write-Warning "No .msix under $release"
          }

          Compress-Archive -Path (Join-Path $release '*') -DestinationPath (Join-Path $out $zipName) -Force
          $zhash = (Get-FileHash -Algorithm SHA256 (Join-Path $out $zipName)).Hash.ToLower()
          Set-Content -Path (Join-Path $out "$zipName.sha256") -Value "$zhash  $zipName" -NoNewline
          Get-ChildItem $out | Format-Table Name, Length

      - name: Upload workflow artefacts
        uses: actions/upload-artifact@v4
        with:
          name: OdakKampi-Windows-${{ steps.meta.outputs.channel }}-b${{ steps.meta.outputs.code }}
          path: app/build/windows-dist/*
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/windows-dist/*
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
