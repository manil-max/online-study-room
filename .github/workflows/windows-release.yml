name: Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java (Required for some flutter plugins)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # You can specify exact version if needed, e.g. flutter-version: '3.22.x'

      - name: Install Dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Run Tests
        working-directory: ./app
        run: flutter test

      - name: Build Windows Executable
        working-directory: ./app
        run: flutter build windows --release

      - name: Generate MSIX Package
        working-directory: ./app
        run: dart run msix:create

      - name: Upload MSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OdakKampi-Windows-MSIX
          path: app/build/windows/*/runner/Release/*.msix
