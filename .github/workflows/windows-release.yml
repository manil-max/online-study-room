name: Windows Release Artifact

on:
  workflow_call:
    inputs:
      git_sha: { required: true, type: string }
      channel: { required: true, type: string }
      version_name: { required: true, type: string }
      build_number: { required: true, type: string }
      migration_head: { required: true, type: string }

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    environment: ${{ inputs.channel == 'beta' && 'staging' || 'production' }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_sha }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Kanal/backend manifestini üret
        shell: pwsh
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          PRODUCTION_SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
          PRODUCTION_SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_SUPABASE_ANON_KEY }}
          STAGING_SUPABASE_PROJECT_REF: ${{ vars.STAGING_SUPABASE_PROJECT_REF }}
          PRODUCTION_SUPABASE_PROJECT_REF: ${{ vars.PRODUCTION_SUPABASE_PROJECT_REF }}
        run: |
          $isBeta = '${{ inputs.channel }}' -eq 'beta'
          $manifest = @{
            CHANNEL = '${{ inputs.channel }}'
            APP_ENVIRONMENT = if ($isBeta) { 'staging' } else { 'production' }
            ALLOW_IN_MEMORY = 'false'
            SUPABASE_URL = if ($isBeta) { $env:STAGING_SUPABASE_URL } else { $env:PRODUCTION_SUPABASE_URL }
            SUPABASE_ANON_KEY = if ($isBeta) { $env:STAGING_SUPABASE_ANON_KEY } else { $env:PRODUCTION_SUPABASE_ANON_KEY }
            SUPABASE_PROJECT_REF = if ($isBeta) { $env:STAGING_SUPABASE_PROJECT_REF } else { $env:PRODUCTION_SUPABASE_PROJECT_REF }
            STAGING_SUPABASE_PROJECT_REF = $env:STAGING_SUPABASE_PROJECT_REF
            PRODUCTION_SUPABASE_PROJECT_REF = $env:PRODUCTION_SUPABASE_PROJECT_REF
            GIT_COMMIT_SHA = '${{ inputs.git_sha }}'
            MIGRATION_HEAD = '${{ inputs.migration_head }}'
            APP_VERSION_NAME = '${{ inputs.version_name }}'
            APP_BUILD_NUMBER = '${{ inputs.build_number }}'
            DISTRIBUTION_CHANNEL = 'windows'
          }
          $manifest | ConvertTo-Json | Set-Content -LiteralPath env.json -Encoding utf8

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test --dart-define-from-file=env.json --concurrency=1
      - name: Kanal/backend fail-closed guard
        run: flutter test test/core/current_build_manifest_gate_test.dart --dart-define-from-file=env.json --dart-define=ENFORCE_CURRENT_BUILD_MANIFEST=true
      - run: flutter build windows --release --build-name=${{ inputs.version_name }} --build-number=${{ inputs.build_number }} --dart-define-from-file=env.json

      - name: MSIX oluştur
        shell: pwsh
        run: |
          $pubspec = Get-Content pubspec.yaml -Raw
          $updated = $pubspec -replace '(msix_version:\s*)[\d.]+', ('${1}1.0.0.${{ inputs.build_number }}')
          if ($updated -eq $pubspec) { throw 'msix_version bulunamadı.' }
          Set-Content pubspec.yaml -Value $updated -Encoding utf8
          dart run msix:create --build-windows false

      - name: Zorunlu Windows artefaktlarını paketle
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $out = 'build/windows-dist'; New-Item -ItemType Directory -Force -Path $out | Out-Null
          $release = 'build/windows/x64/runner/Release'
          $msix = Get-ChildItem -Path $release -Filter *.msix -File | Select-Object -First 1
          if (-not $msix) { throw 'Zorunlu MSIX artefaktı üretilemedi.' }
          $prefix = "odak-kampi-windows-${{ inputs.channel }}"
          $msixOut = Join-Path $out "$prefix.msix"; Copy-Item $msix.FullName $msixOut
          $zipOut = Join-Path $out "$prefix.zip"; Compress-Archive -Path (Join-Path $release '*') -DestinationPath $zipOut -Force
          $items = @($msixOut, $zipOut) | ForEach-Object {
            $name = Split-Path $_ -Leaf; $hash = (Get-FileHash $_ -Algorithm SHA256).Hash.ToLower()
            Set-Content "$_.sha256" -Value "$hash  $name" -NoNewline
            @{ name = $name; sha256 = $hash }
          }
          @{ schemaVersion = 1; platform = 'windows'; status = 'complete'; channel = '${{ inputs.channel }}'; gitCommitSha = '${{ inputs.git_sha }}'; migrationHead = '${{ inputs.migration_head }}'; artifacts = $items } | ConvertTo-Json -Depth 5 | Set-Content (Join-Path $out 'platform-manifest.json') -Encoding utf8

      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: app/build/windows-dist/*
          if-no-files-found: error
