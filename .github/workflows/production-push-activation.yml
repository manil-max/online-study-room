name: Production Push Activation

on:
  workflow_dispatch:
    inputs:
      expected_git_sha:
        description: Exact main commit SHA to activate for production.
        required: true
        type: string

permissions:
  contents: read

jobs:
  activate:
    name: Deploy production FCM dispatcher
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PRODUCTION_SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
      PRODUCTION_SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_SUPABASE_ANON_KEY }}
      PRODUCTION_SUPABASE_PROJECT_REF: ${{ vars.PRODUCTION_SUPABASE_PROJECT_REF }}
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
      PUSH_DISPATCH_SECRET: ${{ secrets.PUSH_DISPATCH_SECRET }}
      EXPECTED_GIT_SHA: ${{ inputs.expected_git_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify exact production activation contract
        shell: bash
        run: |
          set -euo pipefail
          [[ "$EXPECTED_GIT_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "expected_git_sha must be a full SHA"
            exit 1
          }
          [[ "$GITHUB_SHA" = "$EXPECTED_GIT_SHA" ]] || {
            echo "The checked-out commit does not match expected_git_sha"
            exit 1
          }
          for value in \
            SUPABASE_ACCESS_TOKEN \
            PRODUCTION_SUPABASE_URL PRODUCTION_SUPABASE_ANON_KEY \
            PRODUCTION_SUPABASE_PROJECT_REF FIREBASE_PROJECT_ID \
            FCM_SERVICE_ACCOUNT_JSON PUSH_DISPATCH_SECRET; do
            [[ -n "${!value}" ]] || {
              echo "Missing required production configuration: $value"
              exit 1
            }
          done
          [[ "$PRODUCTION_SUPABASE_PROJECT_REF" =~ ^[a-z0-9]{20}$ ]] || {
            echo "Invalid production project ref"
            exit 1
          }
          [[ "$PRODUCTION_SUPABASE_URL" = "https://$PRODUCTION_SUPABASE_PROJECT_REF.supabase.co" ]] || {
            echo "Production URL/project ref mismatch"
            exit 1
          }
          [[ "$PUSH_DISPATCH_SECRET" =~ ^[A-Za-z0-9_-]{48,}$ ]] || {
            echo "PUSH_DISPATCH_SECRET format is invalid"
            exit 1
          }
          printf '%s' "$FCM_SERVICE_ACCOUNT_JSON" | jq -e \
            --arg expected_project "$FIREBASE_PROJECT_ID" \
            '.project_id == $expected_project and
             (.client_email | type == "string" and length > 3) and
             (.private_key | type == "string" and contains("BEGIN PRIVATE KEY"))' \
            >/dev/null
          echo "Production activation contract verified."

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set production Edge secrets without logging credentials
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          secret_file="$RUNNER_TEMP/odak-kampi-production-push.env"
          encoded_account="$(printf '%s' "$FCM_SERVICE_ACCOUNT_JSON" | base64 | tr -d '\n')"
          printf 'FCM_SERVICE_ACCOUNT_BASE64=%s\n' "$encoded_account" > "$secret_file"
          printf 'PUSH_DISPATCH_SECRET=%s\n' "$PUSH_DISPATCH_SECRET" >> "$secret_file"
          trap 'rm -f "$secret_file"' EXIT
          supabase secrets set \
            --project-ref "$PRODUCTION_SUPABASE_PROJECT_REF" \
            --env-file "$secret_file"

      - name: Deploy production dispatcher
        shell: bash
        run: |
          set -euo pipefail
          supabase functions deploy dispatch-push \
            --project-ref "$PRODUCTION_SUPABASE_PROJECT_REF" \
            --use-api \
            --no-verify-jwt

      - name: Configure private dispatcher runtime
        shell: bash
        run: |
          set -euo pipefail
          # Fresh Edge deploys can briefly return 503 while the route warms up.
          # Retry only this idempotent configuration RPC; no notification is enqueued.
          configured=false
          for attempt in {1..12}; do
            if response="$(curl --fail-with-body --silent --show-error \
              -X POST "$PRODUCTION_SUPABASE_URL/functions/v1/dispatch-push" \
              -H "Authorization: Bearer $PRODUCTION_SUPABASE_ANON_KEY" \
              -H 'Content-Type: application/json' \
              -H "x-push-dispatch-secret: $PUSH_DISPATCH_SECRET" \
              --data '{"action":"configure_dispatch"}')" \
              && printf '%s' "$response" | jq -e '.configured == true' >/dev/null; then
              configured=true
              break
            fi
            echo "Dispatcher route is not ready yet (attempt $attempt/12); retrying."
            sleep 5
          done
          [[ "$configured" = true ]] || {
            echo "Dispatcher configuration did not succeed after its readiness window."
            exit 1
          }

      - name: Verify dispatcher health without enqueueing a notification
        shell: bash
        run: |
          set -euo pipefail
          response="$(curl --fail-with-body --silent --show-error \
            -X POST "$PRODUCTION_SUPABASE_URL/functions/v1/dispatch-push" \
            -H "Authorization: Bearer $PRODUCTION_SUPABASE_ANON_KEY" \
            -H 'Content-Type: application/json' \
            -H "x-push-dispatch-secret: $PUSH_DISPATCH_SECRET" \
            --data '{"source":"production_activation"}')"
          printf '%s' "$response" | jq -e \
            '(.claimed | type == "number") and
             (.sent | type == "number") and
             (.retried | type == "number") and
             (.failed | type == "number")' \
            >/dev/null
          echo "Production dispatcher health verified."
